{% extends "base.html" %}

{% block extra-head %}
  <meta property="og:url" content="https://{{ request.site.domain }}{{ flatpage.url }}">
  <meta property="og:title" content="{{ flatpage.title }}">
  <meta property="og:image" content="{% if logo %}https://{{ request.site.domain }}{{ logo.image.url }}{% endif %}">
  <meta property="og:site_name" content="{{ request.site.name }}">
{% endblock extra-head %}

{% block content %}
  <div class="card mx-auto" style="max-width: 960px;">
    <div class="card-header">
      <h3>{{ flatpage.title }}</h3>
    </div>
    <div class="card-body">
      {{ flatpage.content }}
    </div>
  </div>
{% endblock %}
